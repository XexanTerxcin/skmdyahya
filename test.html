<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(42, 42, 42, 0.9);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 60px rgba(255, 96, 0, 0.1);
        }
        .login-box h2 { color: #ff6000; text-align: center; margin-bottom: 30px; }
        .login-box input {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 15px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 15px;
        }
        .login-box input:focus {
            border-color: #ff6000;
            outline: none;
        }
        .login-box button {
            background: #ff6000;
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        .login-box button:hover { background: #e05500; transform: translateY(-2px); }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 30px;
        }
        .header h1 { color: #ff6000; font-size: 32px; }
        .logout-btn {
            background: rgba(220,53,69,0.2);
            border: 1px solid rgba(220,53,69,0.3);
            color: #dc3545;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .logout-btn:hover { background: #dc3545; color: #fff; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(42,42,42,0.8);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        .stat-card .number { font-size: 42px; font-weight: bold; color: #ff6000; }
        .stat-card .label { color: #888; font-size: 14px; margin-top: 5px; }
        
        .table-container {
            background: rgba(42,42,42,0.8);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            overflow-x: auto;
        }
        .table-container h3 { color: #ff6000; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: rgba(255,96,0,0.1); }
        th { padding: 15px; text-align: left; color: #ff6000; border-bottom: 2px solid rgba(255,96,0,0.2); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-unread { background: rgba(255,96,0,0.2); color: #ff6000; }
        .status-read { background: rgba(0,166,81,0.2); color: #00a651; }
        
        .btn-action {
            padding: 5px 12px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            margin: 0 3px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-view { background: rgba(0,123,255,0.2); color: #007bff; }
        .btn-view:hover { background: #007bff; color: #fff; }
        .btn-read { background: rgba(0,166,81,0.2); color: #00a651; }
        .btn-read:hover { background: #00a651; color: #fff; }
        .btn-delete { background: rgba(220,53,69,0.2); color: #dc3545; }
        .btn-delete:hover { background: #dc3545; color: #fff; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            background: rgba(42,42,42,0.95);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .modal-header h2 { color: #ff6000; margin: 0; }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 28px;
            cursor: pointer;
        }
        .modal-close:hover { color: #fff; transform: rotate(90deg); }
        
        .field { margin-bottom: 20px; }
        .field-label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .field-value {
            padding: 10px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            word-wrap: break-word;
        }
        .message-content {
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.8;
        }
        
        .modal-footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state i { font-size: 64px; color: #333; margin-bottom: 20px; }
        .empty-state h3 { color: #888; margin-bottom: 10px; }
        
        .loading { text-align: center; padding: 40px; color: #ff6000; }
        .error { text-align: center; padding: 40px; color: #dc3545; }
        
        .debug-info {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login -->
        <div id="loginScreen">
            <div class="login-box">
                <h2><i class="bi bi-lock-fill"></i> Admin Login</h2>
                <form id="loginForm">
                    <input type="password" id="adminPassword" placeholder="Enter Admin Password" required>
                    <button type="submit"><i class="bi bi-box-arrow-in-right"></i> Login</button>
                </form>
                <div id="loginError" style="color:#dc3545;text-align:center;margin-top:10px;display:none;">Invalid password!</div>
            </div>
        </div>
        
        <!-- Admin Panel -->
        <div id="adminPanel" style="display:none;">
            <div class="header">
                <h1><i class="bi bi-envelope-paper-fill"></i> Message Inbox</h1>
                <button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="number" id="totalMessages">0</div>
                    <div class="label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="unreadMessages">0</div>
                    <div class="label">Unread</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="readMessages">0</div>
                    <div class="label">Read</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="todayMessages">0</div>
                    <div class="label">Today</div>
                </div>
            </div>
            
            <div id="debugInfo" class="debug-info"></div>
            
            <div class="table-container">
                <h3><i class="bi bi-inbox-fill"></i> All Messages</h3>
                <div id="messagesBody">
                    <div class="loading">Loading messages...</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal-overlay" id="messageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="bi bi-envelope-open-fill"></i> Message Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody">
                <div class="field">
                    <div class="field-label">From</div>
                    <div class="field-value" id="modalName">-</div>
                </div>
                <div class="field">
                    <div class="field-label">Email</div>
                    <div class="field-value" id="modalEmail">-</div>
                </div>
                <div class="field">
                    <div class="field-label">Subject</div>
                    <div class="field-value" id="modalSubject">-</div>
                </div>
                <div class="field">
                    <div class="field-label">Date</div>
                    <div class="field-value" id="modalDate">-</div>
                </div>
                <div class="field">
                    <div class="field-label">Message</div>
                    <div class="message-content" id="modalMessage">-</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-action btn-read" onclick="markAsReadFromModal()"><i class="bi bi-check2-circle"></i> Mark as Read</button>
                <button class="btn-action btn-delete" onclick="deleteFromModal()"><i class="bi bi-trash3"></i> Delete</button>
                <button class="btn-action btn-view" onclick="closeModal()"><i class="bi bi-x-circle"></i> Close</button>
            </div>
        </div>
    </div>
    
    <script>
    // ============================================
    // CONFIGURATION - UPDATE WITH YOUR URL
    // ============================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbym6EXqWqZ1gigv-SbCy0G1hAv8j3Vsw1g65RpT6cv-umyQUg3zwxBMs2Wk28ELNS9b/exec';
    const ADMIN_PASSWORD = 'admin123';
    
    let currentMessages = [];
    let currentMessageId = null;

    // ============================================
    // LOGIN
    // ============================================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const password = document.getElementById('adminPassword').value;
        
        if (password === ADMIN_PASSWORD) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadMessages();
        } else {
            document.getElementById('loginError').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loginError').style.display = 'none';
            }, 3000);
        }
    });

    function logout() {
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').style.display = 'none';
    }

    // ============================================
    // LOAD MESSAGES
    // ============================================
    function loadMessages() {
        const body = document.getElementById('messagesBody');
        body.innerHTML = '<div class="loading">Loading messages...</div>';
        
        document.getElementById('debugInfo').style.display = 'block';
        document.getElementById('debugInfo').innerHTML = '📡 Sending request to: ' + SCRIPT_URL + '\n⏳ Waiting for response...';
        
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ action: 'getMessages' })
        })
        .then(response => {
            document.getElementById('debugInfo').innerHTML += '\n✅ Response received (Status: ' + response.status + ')';
            return response.text();
        })
        .then(text => {
            document.getElementById('debugInfo').innerHTML += '\n📄 Raw response: ' + text.substring(0, 200) + '...';
            
            try {
                const data = JSON.parse(text);
                if (data.success) {
                    currentMessages = data.messages || [];
                    renderMessages(currentMessages);
                    updateStats(currentMessages);
                    document.getElementById('debugInfo').innerHTML += '\n✅ Success! Loaded ' + currentMessages.length + ' messages';
                } else {
                    showError('Failed to load messages: ' + (data.error || 'Unknown error'));
                    document.getElementById('debugInfo').innerHTML += '\n❌ Error: ' + (data.error || 'Unknown error');
                }
            } catch (e) {
                showError('Invalid JSON response. Check console for details.');
                console.error('Parse error:', e, 'Raw response:', text);
                document.getElementById('debugInfo').innerHTML += '\n❌ Parse error: ' + e.message;
            }
        })
        .catch(error => {
            console.error('Fetch error:', error);
            showError('Failed to connect: ' + error.message);
            document.getElementById('debugInfo').innerHTML += '\n❌ Connection error: ' + error.message;
        });
    }

    // ============================================
    // RENDER MESSAGES
    // ============================================
    function renderMessages(messages) {
        const body = document.getElementById('messagesBody');
        
        if (!messages || messages.length === 0) {
            body.innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-inbox"></i>
                    <h3>No Messages Yet</h3>
                    <p>Your inbox is empty. Messages will appear here when someone contacts you.</p>
                </div>
            `;
            return;
        }
        
        let html = `
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>From</th>
                        <th>Subject</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        messages.forEach((msg, index) => {
            html += `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${msg.name}</strong></td>
                    <td>${msg.subject}</td>
                    <td>${msg.date}</td>
                    <td>
                        <span class="status-badge ${msg.status === 'Read' ? 'status-read' : 'status-unread'}">
                            ${msg.status}
                        </span>
                    </td>
                    <td>
                        <button class="btn-action btn-view" onclick="viewMessage(${msg.rowIndex})">
                            <i class="bi bi-eye"></i>
                        </button>
                        ${msg.status === 'Unread' ? `
                            <button class="btn-action btn-read" onclick="markAsRead(${msg.rowIndex})">
                                <i class="bi bi-check2"></i>
                            </button>
                        ` : ''}
                        <button class="btn-action btn-delete" onclick="deleteMessage(${msg.rowIndex})">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        
        html += `</tbody></table>`;
        body.innerHTML = html;
    }

    function updateStats(messages) {
        const total = messages.length;
        const unread = messages.filter(m => m.status === 'Unread').length;
        const read = total - unread;
        const today = messages.filter(m => {
            const msgDate = new Date(m.date);
            const todayDate = new Date();
            return msgDate.getDate() === todayDate.getDate() &&
                   msgDate.getMonth() === todayDate.getMonth() &&
                   msgDate.getFullYear() === todayDate.getFullYear();
        }).length;
        
        document.getElementById('totalMessages').textContent = total;
        document.getElementById('unreadMessages').textContent = unread;
        document.getElementById('readMessages').textContent = read;
        document.getElementById('todayMessages').textContent = today;
    }

    function showError(message) {
        document.getElementById('messagesBody').innerHTML = `
            <div class="error">
                <i class="bi bi-exclamation-triangle-fill" style="font-size: 48px;"></i>
                <h4>${message}</h4>
                <button class="btn btn-warning mt-3" onclick="loadMessages()">
                    <i class="bi bi-arrow-clockwise"></i> Retry
                </button>
            </div>
        `;
    }

    // ============================================
    // MESSAGE ACTIONS
    // ============================================
    function viewMessage(rowIndex) {
        const msg = currentMessages.find(m => m.rowIndex === rowIndex);
        if (!msg) return;
        
        currentMessageId = rowIndex;
        
        document.getElementById('modalName').textContent = msg.name;
        document.getElementById('modalEmail').textContent = msg.email;
        document.getElementById('modalSubject').textContent = msg.subject;
        document.getElementById('modalDate').textContent = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : msg.date;
        document.getElementById('modalMessage').textContent = msg.message;
        
        document.getElementById('messageModal').classList.add('active');
        document.body.style.overflow = 'hidden';
        
        if (msg.status === 'Unread') {
            markAsRead(rowIndex);
        }
    }

    function closeModal() {
        document.getElementById('messageModal').classList.remove('active');
        document.body.style.overflow = '';
    }

    function markAsRead(rowIndex) {
        const msg = currentMessages.find(m => m.rowIndex === rowIndex);
        if (msg) {
            msg.status = 'Read';
            renderMessages(currentMessages);
            updateStats(currentMessages);
        }
    }

    function markAsReadFromModal() {
        if (currentMessageId) {
            markAsRead(currentMessageId);
        }
    }

    function deleteMessage(rowIndex) {
        if (!confirm('Are you sure you want to delete this message?')) return;
        
        currentMessages = currentMessages.filter(m => m.rowIndex !== rowIndex);
        renderMessages(currentMessages);
        updateStats(currentMessages);
        closeModal();
    }

    function deleteFromModal() {
        if (currentMessageId) {
            deleteMessage(currentMessageId);
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });
    </script>
</body>
</html>
