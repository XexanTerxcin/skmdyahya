<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a1a; 
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #2a2a2a;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 96, 0, 0.2);
            box-shadow: 0 0 60px rgba(255, 96, 0, 0.1);
        }
        .login-box h2 { color: #ff6000; text-align: center; margin-bottom: 30px; }
        .login-box input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .login-box input:focus { border-color: #ff6000; outline: none; }
        .login-box button {
            background: #ff6000;
            border: none;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-box button:hover { background: #e05500; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0 25px;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { color: #ff6000; font-size: 28px; }
        .logout-btn {
            background: rgba(220,53,69,0.2);
            border: 1px solid rgba(220,53,69,0.3);
            color: #dc3545;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover { background: #dc3545; color: #fff; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #2a2a2a;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #333;
        }
        .stat-card .number { font-size: 40px; font-weight: bold; color: #ff6000; }
        .stat-card .label { color: #888; font-size: 14px; margin-top: 8px; }
        
        .table-container {
            background: #2a2a2a;
            border-radius: 16px;
            border: 1px solid #333;
            padding: 25px;
            overflow-x: auto;
        }
        .table-container h3 { color: #ff6000; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead { background: rgba(255,96,0,0.1); }
        th { 
            padding: 14px 16px; 
            text-align: left; 
            color: #ff6000; 
            border-bottom: 2px solid rgba(255,96,0,0.2);
        }
        td { padding: 14px 16px; border-bottom: 1px solid #333; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        .status-badge { 
            padding: 4px 14px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600;
            display: inline-block;
        }
        .status-unread { background: rgba(255,96,0,0.2); color: #ff6000; }
        .status-read { background: rgba(0,166,81,0.2); color: #00a651; }
        
        .btn-action {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            margin: 0 2px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-view { background: rgba(0,123,255,0.2); color: #007bff; }
        .btn-view:hover { background: #007bff; color: #fff; }
        .btn-read { background: rgba(0,166,81,0.2); color: #00a651; }
        .btn-read:hover { background: #00a651; color: #fff; }
        .btn-delete { background: rgba(220,53,69,0.2); color: #dc3545; }
        .btn-delete:hover { background: #dc3545; color: #fff; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            background: #2a2a2a;
            border-radius: 20px;
            padding: 35px;
            border: 1px solid #333;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .modal-header h2 { color: #ff6000; margin: 0; }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 30px;
            cursor: pointer;
        }
        .modal-close:hover { color: #fff; }
        
        .field { margin-bottom: 20px; }
        .field-label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .field-value {
            padding: 12px 16px;
            background: #1a1a1a;
            border-radius: 10px;
            border: 1px solid #333;
            word-wrap: break-word;
        }
        .message-content {
            padding: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #333;
            max-height: 250px;
            overflow-y: auto;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        
        .modal-footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        
        .empty-state { text-align: center; padding: 50px 20px; color: #666; }
        .empty-state i { font-size: 56px; color: #333; margin-bottom: 15px; }
        .empty-state h3 { color: #888; margin-bottom: 8px; }
        
        .loading { text-align: center; padding: 40px; color: #ff6000; }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,96,0,0.1);
            border-radius: 50%;
            border-top-color: #ff6000;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error { text-align: center; padding: 40px; color: #dc3545; }
        .error .btn-retry {
            background: #ff6000;
            border: none;
            color: #fff;
            padding: 10px 30px;
            border-radius: 10px;
            margin-top: 15px;
            cursor: pointer;
        }
        .error .btn-retry:hover { background: #e05500; }
        
        .debug-info {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            white-space: pre-wrap;
            color: #88ff88;
            border: 1px solid #333;
        }
        
        .status-bar {
            background: #1a1a1a;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 14px;
            border: 1px solid #333;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 22px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-content { padding: 25px; }
            table { font-size: 12px; }
            th, td { padding: 10px 12px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .login-box { margin: 50px 10px; padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login -->
        <div id="loginScreen">
            <div class="login-box">
                <h2>🔐 Admin Login</h2>
                <form id="loginForm">
                    <input type="password" id="adminPassword" placeholder="Enter Password" required>
                    <button type="submit">Login</button>
                </form>
                <div id="loginError" style="color:#dc3545;text-align:center;margin-top:12px;display:none;">Invalid password!</div>
            </div>
        </div>
        
        <!-- Admin Panel -->
        <div id="adminPanel" style="display:none;">
            <div class="header">
                <h1>📬 Message Inbox</h1>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
            
            <div class="status-bar">
                <span id="statusText">⏳ Connecting...</span>
                <span id="messageCount">0 messages</span>
                <span><button onclick="loadMessages()" style="background:#ff6000;border:none;color:#fff;padding:5px 15px;border-radius:8px;cursor:pointer;">🔄 Refresh</button></span>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card"><div class="number" id="totalMessages">0</div><div class="label">Total</div></div>
                <div class="stat-card"><div class="number" id="unreadMessages">0</div><div class="label">Unread</div></div>
                <div class="stat-card"><div class="number" id="readMessages">0</div><div class="label">Read</div></div>
                <div class="stat-card"><div class="number" id="todayMessages">0</div><div class="label">Today</div></div>
            </div>
            
            <div id="debugInfo" class="debug-info"></div>
            
            <div class="table-container">
                <h3>📨 All Messages</h3>
                <div id="messagesBody">
                    <div class="loading"><div class="spinner"></div><div>Loading messages...</div></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal-overlay" id="messageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📄 Message Details</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody">
                <div class="field"><div class="field-label">From</div><div class="field-value" id="modalName">-</div></div>
                <div class="field"><div class="field-label">Email</div><div class="field-value" id="modalEmail">-</div></div>
                <div class="field"><div class="field-label">Subject</div><div class="field-value" id="modalSubject">-</div></div>
                <div class="field"><div class="field-label">Date</div><div class="field-value" id="modalDate">-</div></div>
                <div class="field"><div class="field-label">Message</div><div class="message-content" id="modalMessage">-</div></div>
            </div>
            <div class="modal-footer">
                <button class="btn-action btn-read" onclick="markAsReadFromModal()">✅ Mark Read</button>
                <button class="btn-action btn-delete" onclick="deleteFromModal()">🗑️ Delete</button>
                <button class="btn-action btn-view" onclick="closeModal()">✖️ Close</button>
            </div>
        </div>
    </div>
    
    <script>
    // ============================================
    // CONFIGURATION - REPLACE WITH YOUR URL
    // ============================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzTHCixTBFUlO7I9CRAfFnp6mdQvjTHvfKHUWh0_1ubhxsjK_X_iqsIV4VplEV_VbRI/exec';
    const ADMIN_PASSWORD = 'admin123';
    
    let currentMessages = [];
    let currentMessageId = null;

    // ============================================
    // LOGIN
    // ============================================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const password = document.getElementById('adminPassword').value;
        
        if (password === ADMIN_PASSWORD) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadMessages();
        } else {
            document.getElementById('loginError').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loginError').style.display = 'none';
            }, 3000);
        }
    });

    function logout() {
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').style.display = 'none';
    }

    // ============================================
    // LOAD MESSAGES - USING JSONP APPROACH
    // ============================================
    function loadMessages() {
        const body = document.getElementById('messagesBody');
        body.innerHTML = `<div class="loading"><div class="spinner"></div><div>Loading messages...</div></div>`;
        
        document.getElementById('statusText').textContent = '⏳ Loading...';
        document.getElementById('debugInfo').style.display = 'block';
        document.getElementById('debugInfo').textContent = '📡 Sending request to: ' + SCRIPT_URL + '\n⏳ Waiting for response...';
        
        // Use fetch with proper headers
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'cors',
            cache: 'no-cache',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ action: 'getMessages' })
        })
        .then(response => {
            document.getElementById('debugInfo').textContent += '\n📥 Response status: ' + response.status;
            if (!response.ok) {
                throw new Error('HTTP error! status: ' + response.status);
            }
            return response.json();
        })
        .then(data => {
            document.getElementById('debugInfo').textContent += '\n📄 Response received';
            
            if (data.success) {
                currentMessages = data.messages || [];
                renderMessages(currentMessages);
                updateStats(currentMessages);
                document.getElementById('statusText').textContent = '✅ Connected';
                document.getElementById('debugInfo').textContent += '\n✅ Success! Loaded ' + currentMessages.length + ' messages';
            } else {
                throw new Error(data.error || 'Unknown error');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('debugInfo').textContent += '\n❌ Error: ' + error.message;
            document.getElementById('statusText').textContent = '❌ Connection error';
            
            body.innerHTML = `
                <div class="error">
                    <h4>❌ Connection Failed</h4>
                    <p>${error.message}</p>
                    <button class="btn-retry" onclick="loadMessages()">🔄 Retry</button>
                </div>
            `;
        });
    }

    // ============================================
    // RENDER MESSAGES
    // ============================================
    function renderMessages(messages) {
        const body = document.getElementById('messagesBody');
        
        if (!messages || messages.length === 0) {
            body.innerHTML = `
                <div class="empty-state">
                    <div>📭</div>
                    <h3>No Messages Yet</h3>
                    <p>Your inbox is empty. Messages will appear here when someone contacts you.</p>
                </div>
            `;
            document.getElementById('messageCount').textContent = '0 messages';
            return;
        }
        
        document.getElementById('messageCount').textContent = messages.length + ' messages';
        
        let html = `
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>From</th>
                        <th>Subject</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        messages.forEach((msg, index) => {
            const statusClass = msg.status === 'Read' ? 'status-read' : 'status-unread';
            html += `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${escapeHtml(msg.name)}</strong></td>
                    <td>${escapeHtml(msg.subject)}</td>
                    <td>${escapeHtml(msg.date)}</td>
                    <td>
                        <span class="status-badge ${statusClass}">${msg.status}</span>
                    </td>
                    <td>
                        <button class="btn-action btn-view" onclick="viewMessage(${msg.rowIndex})">👁️</button>
                        ${msg.status === 'Unread' ? `
                            <button class="btn-action btn-read" onclick="markAsRead(${msg.rowIndex})">✅</button>
                        ` : ''}
                        <button class="btn-action btn-delete" onclick="deleteMessage(${msg.rowIndex})">🗑️</button>
                    </td>
                </tr>
            `;
        });
        
        html += `</tbody></table>`;
        body.innerHTML = html;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function updateStats(messages) {
        const total = messages.length;
        const unread = messages.filter(m => m.status === 'Unread').length;
        const read = total - unread;
        const today = messages.filter(m => {
            const msgDate = new Date(m.date);
            const todayDate = new Date();
            return msgDate.getDate() === todayDate.getDate() &&
                   msgDate.getMonth() === todayDate.getMonth() &&
                   msgDate.getFullYear() === todayDate.getFullYear();
        }).length;
        
        document.getElementById('totalMessages').textContent = total;
        document.getElementById('unreadMessages').textContent = unread;
        document.getElementById('readMessages').textContent = read;
        document.getElementById('todayMessages').textContent = today;
    }

    // ============================================
    // MESSAGE ACTIONS
    // ============================================
    function viewMessage(rowIndex) {
        const msg = currentMessages.find(m => m.rowIndex === rowIndex);
        if (!msg) return;
        
        currentMessageId = rowIndex;
        
        document.getElementById('modalName').textContent = msg.name;
        document.getElementById('modalEmail').textContent = msg.email;
        document.getElementById('modalSubject').textContent = msg.subject;
        document.getElementById('modalDate').textContent = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : msg.date;
        document.getElementById('modalMessage').textContent = msg.message;
        
        document.getElementById('messageModal').classList.add('active');
        document.body.style.overflow = 'hidden';
        
        if (msg.status === 'Unread') {
            markAsRead(rowIndex);
        }
    }

    function closeModal() {
        document.getElementById('messageModal').classList.remove('active');
        document.body.style.overflow = '';
    }

    function markAsRead(rowIndex) {
        const msg = currentMessages.find(m => m.rowIndex === rowIndex);
        if (msg) {
            msg.status = 'Read';
            renderMessages(currentMessages);
            updateStats(currentMessages);
        }
    }

    function markAsReadFromModal() {
        if (currentMessageId) {
            markAsRead(currentMessageId);
        }
    }

    function deleteMessage(rowIndex) {
        if (!confirm('Delete this message?')) return;
        
        currentMessages = currentMessages.filter(m => m.rowIndex !== rowIndex);
        renderMessages(currentMessages);
        updateStats(currentMessages);
        closeModal();
    }

    function deleteFromModal() {
        if (currentMessageId) {
            deleteMessage(currentMessageId);
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('debugInfo').style.display = 'none';
    });
    </script>
</body>
</html>
